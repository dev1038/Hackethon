services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app

  webhook:
    build: ./interception/webhook
    ports:
      - "8080:8080"
    volumes:
      - ./interception/webhook:/app
      - webhook_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  webhook_node_modules:
